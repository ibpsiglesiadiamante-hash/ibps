<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>IBPS - Sistema de Gestión Académica</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">

  <!-- External Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Flatpickr Calendar -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>

  <style>
    /* === DARK SLATE FLATPICKR THEME === */
    .flatpickr-calendar { background: #2d3548; border: 1px solid #3d4a63; border-radius: 12px; box-shadow: 0 16px 32px -8px rgba(0,0,0,0.5); padding: 8px; }
    .flatpickr-month { background: #2d3548; color: #e2e8f0; }
    .flatpickr-current-month input.cur-year { color: #e2e8f0; }
    .flatpickr-current-month .flatpickr-monthDropdown-months { background: #2d3548; color: #e2e8f0; }
    .flatpickr-weekday { color: #94a3b8; font-weight: 700; }
    .flatpickr-days { border-color: #3d4a63; }
    .flatpickr-day { color: #e2e8f0; border-radius: 8px; }
    .flatpickr-day:hover { background: #3d4a63; border-color: #3d4a63; }
    .flatpickr-day.today { border-color: #3b82f6; font-weight: 700; }
    .flatpickr-day.today:hover { background: #3b82f6; color: #fff; }
    .flatpickr-day.selected, .flatpickr-day.selected:hover { background: #3b82f6; border-color: #3b82f6; color: #fff; border-radius: 8px; }
    .flatpickr-day.flatpickr-disabled, .flatpickr-day.prevMonthDay, .flatpickr-day.nextMonthDay { color: #4a5568; }
    .flatpickr-prev-month svg, .flatpickr-next-month svg { fill: #e2e8f0; }
    .flatpickr-prev-month:hover svg, .flatpickr-next-month:hover svg { fill: #3b82f6; }
    /* Make date inputs in dark mode visible */
    input[type="date"]::-webkit-calendar-picker-indicator { display: none; }
  </style>

  <!-- Core Scripts -->
  <script src="firebase-config.js"></script>
  <script src="scripts/firebase.js"></script>
  <script src="scripts/utils.js"></script>

  <!-- View Modules -->
  <script src="scripts/views/dashboard.js"></script>
  <script src="scripts/views/semestres.js"></script>
  <script src="scripts/views/materias.js"></script>
  <script src="scripts/views/estudiantes.js"></script>
  <script src="scripts/views/parciales.js"></script>
  <script src="scripts/views/trabajos.js"></script>
  <script src="scripts/views/notas.js"></script>
  <script src="scripts/views/asistencia.js"></script>
  <script src="scripts/views/disciplina.js"></script>
  <script src="scripts/views/historial.js"></script>
  <script src="scripts/views/reportes.js"></script>
  <script src="scripts/views/usuarios.js"></script>
  <script src="scripts/views/perfil.js"></script>
  <script src="scripts/views/configuracion.js"></script>

  <!-- App Controller -->
  <script src="scripts/app.js"></script>

  <!-- Auto-initialize Flatpickr on all date inputs in dynamic views -->
  <script>
    // Attach Flatpickr to any date input not yet initialized
    function initFlatpickr(root) {
      (root || document).querySelectorAll('input[type="date"]:not(.flatpickr-input)').forEach(el => {
        const saved = el.value;
        flatpickr(el, {
          locale: 'es',
          dateFormat: 'Y-m-d',
          allowInput: true,
          disableMobile: false,
          defaultDate: saved || null,
          onClose: function(selectedDates, dateStr, instance) {
            // Trigger onchange event if defined
            const evt = new Event('change', { bubbles: true });
            instance.element.dispatchEvent(evt);
          }
        });
      });
    }

    // Watch #cnt for new date inputs each time a view is rendered
    document.addEventListener('DOMContentLoaded', () => {
      const cnt = document.getElementById('cnt');
      if (!cnt) return;
      const obs = new MutationObserver(() => initFlatpickr(cnt));
      obs.observe(cnt, { childList: true, subtree: true });
    });
  </script>

  <!-- Firebase SDK Bridge -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, onSnapshot, collection, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    window.FB = { initializeApp, getFirestore, doc, getDoc, setDoc, onSnapshot, collection, getDocs, writeBatch };
  </script>

  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <!-- LOGIN -->
  <div id="login">
    <div class="login-card">
      <div class="flex g12" style="margin-bottom: 2rem; justify-content: center;">
        <div class="logo-box" style="width: 48px; height: 48px; font-size: 1.25rem; background: var(--acc); color: #fff; display:flex; align-items:center; justify-content:center; border-radius:8px;">IB</div>
        <h2 style="color: var(--p); font-size: 1.5rem; letter-spacing: -0.025em;">IBPS Portal</h2>
      </div>
      <div id="lerr" style="color:var(--r); font-size: 0.75rem; text-align: center; margin-bottom: 1rem;"></div>
      <div style="margin-bottom: 1.25rem;">
        <label class="lbl">Usuario</label>
        <input type="text" id="u" placeholder="Nombre de usuario" onkeydown="if(event.key==='Enter')login()">
      </div>
      <div style="margin-bottom: 1.5rem;">
        <label class="lbl">Contraseña</label>
        <input type="password" id="p" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
      </div>
      <button class="btn btn-acc" style="width: 100%; justify-content: center; padding: 0.75rem;" onclick="login()">Iniciar Sesión</button>
    </div>
  </div>

  <!-- APP -->
  <div id="app" style="display:none">
    <header id="hdr">
      <div class="flex fsb" style="width: 100%">
        <div class="flex g12" style="position: relative;">
          <button class="menu-btn" onclick="toggleNav(event)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
            <span class="menu-lbl">Menú</span>
          </button>
          <div id="nav-dropdown" class="nav-dropdown"></div>
          <div style="font-weight:700; font-size: 1.1rem; color: #fff; margin-left:1rem" class="no-mob">Portal Académico</div>
        </div>
        <div class="flex g12">
          <div id="sync-status" style="font-size: 0.7rem; font-weight:700; color: #fff; background: rgba(255,255,255,0.1); padding: 4px 12px; border-radius: 20px;">Local</div>
          <button class="user-profile" id="userBtn" onclick="toggleDD(event)" style="border:none;background:transparent;outline:none;font-family:inherit; cursor:pointer;">
            <div id="hu" style="font-size: 0.8rem; font-weight:700; color:#fff; max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; pointer-events: none;" class="no-mob">Usuario</div>
            <div class="avatar" id="ua" style="flex-shrink: 0; pointer-events: none;">U</div>
          </button>
          
          <!-- Dropdown outside the button -->
          <div class="dropdown-menu" id="userDD">
            <div class="dd-item" onclick="go('perfil')">👤 Mi Perfil</div>
            <div class="dd-item" onclick="go('dashboard')">🏠 Dashboard</div>
            <div class="dd-sep"></div>
            <div class="dd-item" style="color: var(--r)" onclick="logout()">🚪 Cerrar Sesión</div>
          </div>
        </div>
      </div>
    </header>

    <main id="cnt"></main>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker registrado', reg))
          .catch(err => console.error('Error al registrar Service Worker', err));
      });
    }
  </script>
</body>
